name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend (Gradle, JDK 25)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # 컴파일 + 패키징 검증(Docker 빌드와 동일한 bootJar). 테스트는 DB(MySQL) 필요 → 생략.
      # 'build' 대신 'bootJar' 를 써서 Spotless 포맷 검사(spotlessCheck)에 막히지 않게 한다.
      - name: Build
        run: ./gradlew clean bootJar -x test --no-daemon --stacktrace

  frontend:
    name: Frontend (Vite build, Node 22)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
