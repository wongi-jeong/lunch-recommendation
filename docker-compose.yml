services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_DATABASE: lunch_recommendation
      MYSQL_USER: ${DB_USER:-appuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-lunchpw}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpw}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD:-rootpw}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/lunch_recommendation?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-appuser}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-lunchpw}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      # 비워두면 데모 모드(샘플 데이터). 실제 데이터가 필요하면 .env 에 서버측 키를 넣으세요.
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
    ports:
      - "8080:8080"   # 디버깅용(프론트는 내부 네트워크로 접근)
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        # 지도 타일 렌더링용 클라이언트 키(빌드 시 주입). 비우면 지도만 안 나옴.
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
    ports:
      - "5173:80"     # http://localhost:5173 로 접속
    depends_on:
      - backend

volumes:
  mysql_data:
