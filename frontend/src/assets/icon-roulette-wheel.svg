<svg preserveAspectRatio="none" width="100%" height="100%" overflow="visible" style="display: block;" viewBox="0 0 444 444" fill="none" xmlns="http://www.w3.org/2000/svg">
<g id="accessory">
  <!-- 연한 연두색 배경 링 -->
  <circle id="edge-background" cx="222" cy="222" r="210" stroke="#CBEED6" stroke-width="24" stroke-linecap="round"/>
  <!-- 연두색 점 (배경 링 안쪽 중앙에 동일 간격으로 배치) -->
  <!-- r=210 기준 둘레 ≈ 1319px, 점 24개 기준 간격 ≈ 55px -->
  <circle id="edge" cx="222" cy="222" r="210" stroke="#3CB571" stroke-width="8" stroke-linecap="round" stroke-dasharray="0.5 54.5"/>
  <circle id="center" cx="222" cy="222" r="20" fill="var(--fill-0, #1B623A)"/>
</g>
</svg>
